name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations
        run: |
          python backend/manage.py migrate --noinput
      - name: Run backend tests
        run: |
          python backend/manage.py test -v2

  e2e-tests:
    runs-on: ubuntu-latest
    needs: backend-tests
    services: {}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations
        run: |
          python backend/manage.py migrate --noinput
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci
      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps
      - name: Start backend server
        run: |
          nohup python backend/manage.py runserver 0.0.0.0:8000 &
          sleep 3
      - name: Wait for backend
        run: |
          for i in {1..10}; do
            curl -sS http://127.0.0.1:8000/api/auth/csrf/ && break || sleep 1
          done
      - name: Run Playwright E2E
        run: |
          cd frontend
          npm run test:e2e
  deploy:
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t taskmanager-app .

      - name: Create SSH Key
        run: |
          echo "${{ secrets.TM_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Export Docker Image
        run: |
          docker save taskmanager-app -o taskmanager-app.tar

      - name: Copy Image To EC2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem taskmanager-app.tar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~

      - name: Deploy On EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            sudo docker load -i taskmanager-app.tar &&
            sudo docker stop \$(sudo docker ps -q) || true &&
            sudo docker rm \$(sudo docker ps -aq) || true &&
            sudo docker run -d -p 8000:8000 taskmanager-app
          "
